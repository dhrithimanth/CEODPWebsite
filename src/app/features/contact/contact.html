<section class="contact-section">
    <div class="container">
        <div class="section-header">
            <h2 class="title">Request a Demo</h2>
            <p class="subtitle">
                Get in touch with our team to see how CEODP can transform your payment operations.
            </p>
        </div>

        <form class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Name" class="form-control">
                </div>
                <div class="form-group">
                    <input type="text" id="organization" placeholder="Organization" class="form-control">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" class="form-control">
                </div>
                <div class="form-group">
                    <input type="tel" id="phone" placeholder="Phone" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <textarea id="message" placeholder="Message" class="form-control" rows="5"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Request</button>
        </form>
    </div>
</section>
