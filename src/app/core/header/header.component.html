<header class="ceodp-header">
  <div class="container">
    <div class="logo" routerLink="/">
      <img src="/assets/logo.png" alt="CEODP Logo" class="logo-img">
    </div>

    <!-- Desktop Navigation -->
    <nav class="nav-menu desktop-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/about" routerLinkActive="active">About Us</a>
      <a routerLink="/product-suite" routerLinkActive="active">Modules</a>
      <a routerLink="/architecture" routerLinkActive="active">Architecture</a>
      <a routerLink="/why-ceodp" routerLinkActive="active">Why CEODP</a>
      <a routerLink="/testimonials" routerLinkActive="active">Testimonials</a>
      <a routerLink="/news" routerLinkActive="active">News</a>
      <a routerLink="/contact" routerLinkActive="active" class="btn-contact">Contact Us</a>
    </nav>

    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <i class="fa-solid fa-bars" *ngIf="!isMenuOpen"></i>
      <i class="fa-solid fa-xmark" *ngIf="isMenuOpen"></i>
    </button>
  </div>

  <!-- Mobile Navigation Overlay -->
  <div class="mobile-nav-overlay" [class.open]="isMenuOpen">
    <nav class="mobile-nav-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        (click)="closeMenu()">Home</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About Us</a>
      <a routerLink="/product-suite" routerLinkActive="active" (click)="closeMenu()">Modules</a>
      <a routerLink="/architecture" routerLinkActive="active" (click)="closeMenu()">Architecture</a>
      <a routerLink="/why-ceodp" routerLinkActive="active" (click)="closeMenu()">Why CEODP</a>
      <a routerLink="/testimonials" routerLinkActive="active" (click)="closeMenu()">Testimonials</a>
      <a routerLink="/news" routerLinkActive="active" (click)="closeMenu()">News</a>
      <a routerLink="/contact" routerLinkActive="active" class="btn-contact" (click)="closeMenu()">Contact Us</a>
    </nav>
  </div>
</header>
